name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t review-service:test .
      - name: Health check
        run: |
          docker run -d -p 8080:8080 --name test review-service:test
          sleep 5
          curl -f http://localhost:8080/health
          docker stop test
